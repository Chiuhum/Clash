; ========== 核心覆写开关（必须开） ==========
target=clash
enable_rule_generator=true
; 开启 = 覆盖订阅原有所有策略组/规则/DNS
overwrite_original_rules=true

; ========== 节点过滤 ==========
exclude_remarks=(测试|过期|流量|官网|备用|剩余)


; ========== 自定义策略组（完全覆写） ==========
custom_proxy_group=Proxy`select`.*
custom_proxy_group=LoadBalance`load-balance`HK`TW`JP`SG`US`AU`Other
custom_proxy_group=🇭🇰`url-test`(港|HK|hk|Hong Kong|HongKong|hongkong)`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇹🇼`url-test`(台|新北|彰化|TW|Taiwan)`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇯🇵`url-test`(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan)`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=SG`url-test`(新加坡|坡|狮城|SG|Singapore)`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=US`url-test`(美|美国|US|America)`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=AU`url-test`(澳洲|澳大利亚|AU|Australia)`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=Other`url-test`(?!.*(HK|TW|JP|TY|OS|SG|AU|US|Valid|有效期|GUEST))`http://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=FallBack`fallback`(DIRECT)

custom_proxy_group=🚀 节点选择`select`[]DIRECT`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 全球拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 全球直连`.*

; ========== 自定义规则（完全覆写） ==========
RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanEasyList.list,REJECT-DROP
RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanEasyListChina.list,REJECT-DROP
RULE-SET,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanEasyPrivacy.list,REJECT-DROP

DOMAIN-SUFFIX,youtube.com,US

GEOSITE,PRIVATE,DIRECT
GEOSITE,CN,DIRECT
GEOSITE,GFW,LoadBalance
GEOIP,CN,DIRECT,no-resolve
MATCH,FallBack