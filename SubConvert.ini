[custom]
; ========== 核心覆写开关（必须开） ==========
enable_rule_generator=true
; 开启 = 覆盖订阅原有所有策略组/规则/DNS
overwrite_original_rules=true

; ========== 禁用所有 Emoji 和名称美化 ==========
disable_emoji=true
enable_name_format=false
no_comment=true


; ========== 自定义策略组（完全覆写） ==========
custom_proxy_group=Proxy`select`.*
;custom_proxy_group=LoadBalance`load-balance`[]HK`[]TW`[]JP`[]SG`[]US`[]AU`[]Other
custom_proxy_group=HK`url-test`(港|HK|hk|Hong Kong|HongKong|hongkong)`http://cp.cloudflare.com/generate_204`300
custom_proxy_group=TW`url-test`(台|新北|彰化|TW|Taiwan)`http://cp.cloudflare.com/generate_204`300,
custom_proxy_group=JP`url-test`(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan)`http://cp.cloudflare.com/generate_204`300
custom_proxy_group=SG`url-test`(新加坡|坡|狮城|SG|Singapore)`http://cp.cloudflare.com/generate_204`300
custom_proxy_group=US`url-test`(美|美国|US|America)`http://cp.cloudflare.com/generate_204`300
custom_proxy_group=AU`url-test`(澳洲|澳大利亚|AU|Australia)`http://cp.cloudflare.com/generate_204`300
custom_proxy_group=Other`url-test`(^(?!.*(HK|TW|JP|TY|OS|SG|AU|US|Valid|有效期|GUEST)).*)`http://cp.cloudflare.com/generate_204`300
custom_proxy_group=FallBack`fallback`[]DIRECT`http://www.gstatic.com/generate_204`300


; ========== 自定义规则（完全覆写） ==========
ruleset=FallBack,[]FINAL